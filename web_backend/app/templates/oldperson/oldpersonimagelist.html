	<link rel="stylesheet" type="text/css" href="css/cloud-admin.css" >
	<link rel="stylesheet" type="text/css"  href="css/themes/default.css" id="skin-switcher" >
	<link rel="stylesheet" type="text/css"  href="css/responsive.css" >
	
	<link href="font-awesome/css/font-awesome.min.css" rel="stylesheet">
	<!-- JQUERY UI-->
	<link rel="stylesheet" type="text/css" href="js/jquery-ui-1.10.3.custom/css/custom-theme/jquery-ui-1.10.3.custom.min.css" />
	<!-- DATE RANGE PICKER -->
	<link rel="stylesheet" type="text/css" href="js/bootstrap-daterangepicker/daterangepicker-bs3.css" />
	<!-- DATA TABLES -->
	<link rel="stylesheet" type="text/css" href="js/datatables/media/css/jquery.dataTables.min.css" />
	<link rel="stylesheet" type="text/css" href="js/datatables/media/assets/css/datatables.min.css" />

	<link rel="stylesheet" type="text/css" href="js/colorbox/colorbox.min.css" />

	<link href='font-awesome/fonts/open-sans.css' rel='stylesheet' type='text/css'>
</head>
<body>
	<!-- HEADER -->
	{% include 'topbar.html' %}
	<!--/HEADER -->
	
	<!-- PAGE -->
	<section id="page">
				<!-- SIDEBAR -->
				{% include 'leftsidebar.html' %}
				<!-- /SIDEBAR -->
		<div id="main-content">
			<!-- SAMPLE BOX CONFIGURATION MODAL FORM-->

			<!-- /SAMPLE BOX CONFIGURATION MODAL FORM-->
			<div class="container">
				<div class="row">
					<div id="content" class="col-lg-12">
						<!-- PAGE HEADER-->
						<div class="row">
							<div class="col-sm-12">
								<div class="page-header">
									<!-- STYLER -->
									
									<!-- /STYLER -->
									<!-- BREADCRUMBS -->
									<ul class="breadcrumb">
										<li>
											<i class="fa fa-home"></i>
											<a href="index.html">主页</a>
										</li>
										<li>
											<a href="#">老年人信息</a>
										</li>
									</ul>
									<!-- /BREADCRUMBS -->
									<div class="clearfix">
										<h3 class="content-title pull-left">老年人信息</h3>
									</div>
								</div>
							</div>
						</div>
						<!-- /PAGE HEADER -->

						<!-- EXPORT TABLES -->
						<!-- GALLERY -->
						<div class="row">
							<div class="col-md-12">
								<!-- BOX -->
								<div class="box">
									<div class="box-title">
										<h4><i class="fa fa-bars"></i>[{{selectdata.username}}]头像列表</h4>
										<div class="tools">
											<a href="#box-config" data-toggle="modal" class="config">
												<i class="fa fa-cog"></i>
											</a>
											<a href="javascript:;" class="reload">
												<i class="fa fa-refresh"></i>
											</a>
											<a href="javascript:;" class="collapse">
												<i class="fa fa-chevron-up"></i>
											</a>
											<a href="javascript:;" class="remove">
												<i class="fa fa-times"></i>
											</a>
										</div>
									</div>
									<div class="box-body">

										<div id="imagelistid" class="row">

											{% for image in imagelist %}

											<div class="col-md-3 isotope-item">
												<div class="filter-content">
													<!--<img src="img/oldperson/{{selectdata.id}}/{{image}}" alt="" class="img-responsive">-->
													<img src="img/oldperson/{{selectdata.id}}/{{image}}" alt="" class="img-responsive">
													<div class="hover-content">
														<h4>操作</h4>
														<a class="btn btn-success hover-link" href="#" onclick="setImage('{{image}}')" title="设为头像">
															<i class="fa fa-edit fa-1x"></i>
														</a>
														<a class="btn btn-warning hover-link colorbox-button" href="img/oldperson/{{selectdata.id}}/{{image}}" title="点击放大">
															<i class="fa fa-search-plus fa-1x"></i>
														</a>
													</div>
												</div>
											</div>
											{% endfor %}

										</div>
									</div>
								</div>
								<!-- /BOX -->
							</div>
						</div>
						<!-- /GALLERY -->

					</div><!-- /CONTENT-->
				</div>
			</div>
		</div>
	</section>
	<!--/PAGE -->
	<!-- JAVASCRIPTS -->
	<!-- Placed at the end of the document so the pages load faster -->
	<!-- JQUERY -->
	<script src="js/jquery/jquery-2.0.3.min.js"></script>
	<!-- JQUERY UI-->
	<script src="js/jquery-ui-1.10.3.custom/js/jquery-ui-1.10.3.custom.min.js"></script>
	<!-- BOOTSTRAP -->
	<script src="bootstrap-dist/js/bootstrap.min.js"></script>
	
		
	<!-- DATE RANGE PICKER -->
	<script src="js/bootstrap-daterangepicker/moment.min.js"></script>
	
	<script src="js/bootstrap-daterangepicker/daterangepicker.min.js"></script>
	<!-- SLIMSCROLL -->
	<script type="text/javascript" src="js/jQuery-slimScroll-1.3.0/jquery.slimscroll.min.js"></script><script type="text/javascript" src="js/jQuery-slimScroll-1.3.0/slimScrollHorizontal.min.js"></script>
	<!-- BLOCK UI -->
	<script type="text/javascript" src="js/jQuery-BlockUI/jquery.blockUI.min.js"></script>
	<!-- DATA TABLES -->
	<script type="text/javascript" src="js/datatables/media/js/jquery.dataTables.min.js"></script>
	<script type="text/javascript" src="js/datatables/media/assets/js/datatables.min.js"></script>
	<script type="text/javascript" src="js/datatables/extras/TableTools/media/js/TableTools.min.js"></script>
	<script type="text/javascript" src="js/datatables/extras/TableTools/media/js/ZeroClipboard.min.js"></script>

	<!-- ISOTOPE -->
	<script type="text/javascript" src="js/isotope/jquery.isotope.min.js"></script>
	<script type="text/javascript" src="js/isotope/imagesloaded.pkgd.min.js"></script>
	<!-- COLORBOX -->
	<script type="text/javascript" src="js/colorbox/jquery.colorbox.min.js"></script>
	<!-- COOKIE -->
	<script type="text/javascript" src="js/jQuery-Cookie/jquery.cookie.min.js"></script>
	<!-- CUSTOM SCRIPT -->
	<!-- websocket --socket.io. SCRIPT -->
	<script src="js/websocket/socket.io.js"></script>
	<script src="js/script.js"></script>
	<script>

		var socket;
		jQuery(document).ready(function() {		
			App.setPage("gallery");  //Set current page
			App.init(); //Initialise plugins and elements
			connet_ws();
		});

		function addDiv(id,image)
		{

			$("#imagelistid").prepend("<div class='col-md-3 isotope-item'>"+
				"<div class='filter-content'>"+
					"<img src='img/oldperson/"+id+"/"+image+"'"+" class='img-responsive' />"+
					"<div class='hover-content'>"+
					"<h4>操作</h4>"+
					"<a class='btn btn-success hover-link'  href='#' title='设为头像'>"+
					"<i class='fa fa-edit fa-1x'></i>"+
					"</a>"+
					"<a class='btn btn-warning hover-link colorbox-button' href='img/oldperson/"+id+"/"+image+"'"+"  title='点击放大'>"+
					"<i class='fa fa-search-plus fa-1x'></i>"+
					"</a></div></div>"+
					"</div>");

		}
		function connet_ws()
		{
			namespace = '/oldpersonimage'
			socket = io.connect(location.protocol + '//' + document.domain + ':' + location.port + namespace,{'reconnection delay': 2000});

			socket.on('connect', function() {
						socket.emit('my_event', {data: 'I\'m connected!'});
					});

			socket.on('image_data', function(msg) {
					//alert(msg.id+','+msg.image);
					addDiv(msg.id,msg.image);
					//var json_data = JSON.parse(msg.data);
					//alert(json_data);
					//for(var key in json_data){
								//alert(key+':'+json_data[key]);
								//$("#"+key).text(json_data[key]);
					//		}

				 });

		}

		function setImage(imageFile)
		{

			$.ajax({
			url: '/setImage/'+imageFile,
			contentType: 'application/json;charset=UTF-8',
			cache:false,
			dataType: 'html',
			success: function (response) {
				alert('操作成功!');
				}
			});
		}



		function selectdata(id)
		{
			$.ajax({
			url: '/editoldpersoninfo'+'/'+id,
			contentType: 'application/json;charset=UTF-8',
			cache:false,
			dataType: 'html',
			success: function (response) {

				var result = $('#box-config').append(response).find('#box-config').html();
				$('#box-config').html(result);

				$('#box-config').modal('show');
				}
			});
		}

		//add new record
		$('a.config').click(function() {
           selectdata(0);
        });

 		function callDate(id)
		{
			$("#"+id).datepicker({ dateFormat: 'yy-mm-dd' });
		}


	</script>
	<!-- /JAVASCRIPTS -->
</body>
</html>
