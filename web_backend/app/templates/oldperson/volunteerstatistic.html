	<script>
		// 基于准备好的dom，初始化echarts实例



     function loadAgeChart(){
    	var myChart = echarts.init(document.getElementById('main'));

    	myChart.setOption({
    	color: ['#CF6A48','#3D7A54','#4A7FA5','#C0392B','#D4943A','#5B3A7A','#2D6A9F'],
    	tooltip : {
			trigger: 'axis',
			axisPointer : {            // 坐标轴指示器，坐标轴触发有效
				type : 'shadow'        // 默认为直线，可选为：'line' | 'shadow'
			 }
         },
        grid: {
			left: '3%',
			right: '4%',
			bottom: '3%',
			containLabel: true
         },
        xAxis : [
        	{
				type : 'category',
				data : [],
				axisTick: {
					alignWithLabel: true
				}
        	}
    	],
        yAxis : [
           {
              type : 'value',
              minInterval:1
           }
         ],
    series : [
        {
            name:'人数',
            type:'bar',
            barWidth: '60%',
            data:[]
        }
    ]
  });
  myChart.showLoading();

    var names = [];    //（实际用来盛放X轴坐标值）
    var nums = [];    //（实际用来盛放Y坐标值）

    $.ajax({
			url: '/volunteerstatistic/age',
			contentType: 'application/json;charset=UTF-8',
			cache:false,
			dataType: 'json',
			success: function (response) {

				 $.each(response.list, function (index, item) {
                names.push(item.name);    //挨个取出类别并填入类别数组                    
                nums.push(item.num);    //挨个取出销量并填入销量数组
            });
                myChart.hideLoading();

                 myChart.setOption({        //加载数据图表
                xAxis: {
                    data: names
                },
                series: [{
                    data: nums.map(function(v,i){return {value:v,itemStyle:{color:['#CF6A48','#3D7A54','#4A7FA5','#C0392B','#D4943A','#5B3A7A','#2D6A9F'][i%7]}}})
                }]
            });

			}
		});

  }



        //饼图--男女分布

 function loadGenderChart(){
 	var chart2 = echarts.init(document.getElementById('main2'));
 	chart2.setOption({
    color: ['#CF6A48','#3D7A54','#4A7FA5','#C0392B','#D4943A','#5B3A7A','#2D6A9F'],
    title : {
        text: '',
        subtext: '',
        x:'center'
    },
    tooltip : {
        trigger: 'item',
        formatter: "{a} <br/>{b} : {c} ({d}%)"
    },
    legend: {
        orient: 'vertical',
        left: 'left',
        data: ['男','女']
    },
    series : [
        {
            name: '性别分布',
            type: 'pie',
            radius : '55%',
            center: ['50%', '60%'],
            data:[
                {value:21, name:'男'},
                {value:12, name:'女'}
            ],
            itemStyle: {
                emphasis: {
                    shadowBlur: 10,
                    shadowOffsetX: 0,
                    shadowColor: 'rgba(0, 0, 0, 0.5)'
                }
            }
        }
    ]
  });

 chart2.showLoading();

    var names = [];    //（实际用来盛放X轴坐标值）
    var nums = [];    //（实际用来盛放Y坐标值）

    $.ajax({
			url: '/volunteerstatistic/gender',
			contentType: 'application/json;charset=UTF-8',
			cache:false,
			dataType: 'json',
			success: function (response) {

				 $.each(response.list, function (index, item) {
                names.push(item.name);                        
                nums.push(item.num);    
            });
                chart2.hideLoading();

                 chart2.setOption({        
                series: [{
                    data: response.list
                }]
            });

			}
		});

  }

		jQuery(document).ready(function() {

			App.init(); //Initialise plugins and elements

			 loadAgeChart();
