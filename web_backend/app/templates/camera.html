<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>摄像头监控</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="css/cloud-admin.css">
    <link rel="stylesheet" type="text/css" href="css/themes/default.css">
    <link href="font-awesome/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="css/custom.css">
    <style>
        .cam-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .cam-box img { width: 100%; display: block; }
    </style>
</head>
<body>
    {% include 'topbar.html' %}
    <section id="page">
        {% include 'leftsidebar.html' %}
        <div id="main-content">
            <div class="container">
                <div class="row">
                    <div id="content" class="col-lg-12">
                        <!-- PAGE HEADER-->
                        <div class="row">
                            <div class="col-sm-12">
                                <div class="page-header">
                                    <!-- BREADCRUMBS -->
                                    <ul class="breadcrumb">
                                        <li>
                                            <i class="fa fa-home"></i>
                                            <a href="/datamanage">主页</a>
                                        </li>
                                        <li>视频监控</li>
                                    </ul>
                                    <div class="clearfix">
                                        <h3 class="content-title pull-left">摄像头实时监控</h3>
                                    </div>
                                </div>
                            </div>
                        </div>
                <div class="cam-grid">
                    <div class="cam-box">
                        <div class="cam-label"><i class="fa fa-video-camera"></i> 房间摄像头</div>
                        <img src="/camera/stream/room" alt="房间">
                    </div>
                    <div class="cam-box">
                        <div class="cam-label"><i class="fa fa-video-camera"></i> 院内摄像头</div>
                        <img src="/camera/stream/yard" alt="院内">
                    </div>
                    <div class="cam-box">
                        <div class="cam-label"><i class="fa fa-video-camera"></i> 走廊摄像头</div>
                        <img src="/camera/stream/corridor" alt="走廊">
                    </div>
                    <div class="cam-box">
                        <div class="cam-label"><i class="fa fa-video-camera"></i> 桌旁摄像头</div>
                        <img src="/camera/stream/desk" alt="桌旁">
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script src="js/jquery/jquery-2.0.3.min.js"></script>
    <script src="bootstrap-dist/js/bootstrap.min.js"></script>
    <script src="js/jQuery-slimScroll-1.3.0/jquery.slimscroll.min.js"></script>
    <script src="js/script.js"></script>
    <script>jQuery(document).ready(function() { App.setPage("camera"); App.init(); });</script>
</body>
</html>
