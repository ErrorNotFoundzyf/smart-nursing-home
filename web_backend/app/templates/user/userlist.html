<!DOCTYPE html>
<html lang="en">
<head>
	<meta http-equiv="content-type" content="text/html; charset=UTF-8">
	<meta charset="utf-8">
	<title>用户列表</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
	<meta name="description" content="">
	<meta name="author" content="">
	<!-- STYLESHEETS --><!--[if lt IE 9]><script src="js/flot/excanvas.min.js"></script><script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script><script src="http://css3-mediaqueries-js.googlecode.com/svn/trunk/css3-mediaqueries.js"></script><![endif]-->
	<link rel="stylesheet" type="text/css" href="css/cloud-admin.css" >
	<link rel="stylesheet" type="text/css"  href="css/themes/default.css" id="skin-switcher" >
	<link rel="stylesheet" type="text/css"  href="css/responsive.css" >
	
	<link href="font-awesome/css/font-awesome.min.css" rel="stylesheet">
	<!-- JQUERY UI-->
	<link rel="stylesheet" type="text/css" href="js/jquery-ui-1.10.3.custom/css/custom-theme/jquery-ui-1.10.3.custom.min.css" />
	<!-- DATE RANGE PICKER -->
	<link rel="stylesheet" type="text/css" href="js/bootstrap-daterangepicker/daterangepicker-bs3.css" />
	<!-- DATA TABLES -->
	<link rel="stylesheet" type="text/css" href="js/datatables/media/css/jquery.dataTables.min.css" />
	<link rel="stylesheet" type="text/css" href="js/datatables/media/assets/css/datatables.min.css" />
	<link rel="stylesheet" type="text/css" href="js/datatables/extras/TableTools/media/css/TableTools.min.css" />
	<!-- FONTS -->
	<link href='font-awesome/fonts/open-sans.css' rel='stylesheet' type='text/css'>
	<!-- DATE PICKER -->
	<link rel="stylesheet" type="text/css" href="js/datepicker/themes/default.min.css" />
	<link rel="stylesheet" type="text/css" href="js/datepicker/themes/default.date.min.css" />
	<link rel="stylesheet" type="text/css" href="js/datepicker/themes/default.time.min.css" />
	<link rel="stylesheet" type="text/css" href="css/custom.css" >
</head>
<body>
	<!-- HEADER -->
	{% include 'topbar.html' %}
	<!--/HEADER -->
	
	<!-- PAGE -->
	<section id="page">
				<!-- SIDEBAR -->
				{% include 'leftsidebar.html' %}
				<!-- /SIDEBAR -->
		<div id="main-content">
			<!-- SAMPLE BOX CONFIGURATION MODAL FORM-->
			<div class="modal fade" id="box-config" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
				<div class="modal-dialog">
				  <div class="modal-content">
					<div class="modal-header">
					  <button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;</button>
					  <h4 class="modal-title">信息编辑</h4>
					</div>
					<div class="modal-body">

					  Here goes box setting content.
					</div>
					<div class="modal-footer">
					  <button type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
					  <button type="button" class="btn btn-primary">保存</button>
					</div>
				  </div>
				</div>
			  </div>
			<!-- /SAMPLE BOX CONFIGURATION MODAL FORM-->
			<div class="container">
				<div class="row">
					<div id="content" class="col-lg-12">
						<!-- PAGE HEADER-->
						<div class="row">
							<div class="col-sm-12">
								<div class="page-header">
									<!-- STYLER -->
									
									<!-- /STYLER -->
									<!-- BREADCRUMBS -->
									<ul class="breadcrumb">
										<li>
											<i class="fa fa-home"></i>
											<a href="/datamanage">主页</a>
										</li>
										<li>
											<a href="#">用户信息</a>
										</li>
									</ul>
									<!-- /BREADCRUMBS -->
									<div class="clearfix">
										<h3 class="content-title pull-left">用户列表</h3>
									</div>
								</div>
							</div>
						</div>
						<!-- /PAGE HEADER -->

						<!-- EXPORT TABLES -->
						<div class="row">
							<div class="col-md-12">
								<!-- BOX -->
								<div class="box">
									<div class="box-title" style="display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #E8DDD4;">
										<span style="font-size:14px;font-weight:700;color:#1A1209;">用户账户列表</span>
										<button class="btn btn-sm btn-primary" onclick="selectOneRecord(0)">添加用户</button>
									</div>
									<div class="box-body">
										<table id="datatable1" cellpadding="0" cellspacing="0" border="0" class="datatable table table-striped table-bordered table-hover">
											<thead>
												<tr>
													<th>登录名</th>
													<th>用户名称</th>
													<th class="hidden-xs">创建日期</th>
													<th>登录邮箱 </th>
													<th class="hidden-xs">页面风格</th>
													<th class="hidden-xs">编辑</th>
												</tr>
											</thead>
											<tbody>

											{% for data in userlist %}
											   <tr class="gradeX">
												   <td>{{data.username}}</td>
												   <td>{{data.real_name}}</td>
												   <td class="hidden-xs">{{data.created}}</td>
												   <td class="center">{{data.email}}</td>
												  <td class="center hidden-xs">{{data.theme}}</td>
												   <td>

													<a href="#" onclick="selectOneRecord({{data.id}});return false;" class="btn btn-xs btn-default">编辑</a>
														<a href="/deleteuser/{{data.id}}" class="btn btn-xs btn-danger" onclick="return confirm('确认删除？')">删除</a>
													</td></tr>
											{%- endfor %}
											</tbody></table>
									</div></div></div></div>
						<!-- /EXPORT TABLES -->
						<div class="separator"></div>


						<div class="footer-tools">
							<span class="go-top">
								<i class="fa fa-chevron-up"></i> Top
							</span>
						</div>
					</div><!-- /CONTENT-->
				</div>
			</div>
		</div>
	</section>
	<!--/PAGE -->
	<!-- JAVASCRIPTS -->
	<!-- Placed at the end of the document so the pages load faster -->
	<!-- JQUERY -->
	<script src="js/jquery/jquery-2.0.3.min.js"></script>
	<!-- JQUERY UI-->
	<script src="js/jquery-ui-1.10.3.custom/js/jquery-ui-1.10.3.custom.min.js"></script>
	<!-- BOOTSTRAP -->
	<script src="bootstrap-dist/js/bootstrap.min.js"></script>
	
		
	<!-- DATE RANGE PICKER -->
	<script src="js/bootstrap-daterangepicker/moment.min.js"></script>
	
	<script src="js/bootstrap-daterangepicker/daterangepicker.min.js"></script>
	<!-- SLIMSCROLL -->
	<script type="text/javascript" src="js/jQuery-slimScroll-1.3.0/jquery.slimscroll.min.js"></script><script type="text/javascript" src="js/jQuery-slimScroll-1.3.0/slimScrollHorizontal.min.js"></script>
	<!-- BLOCK UI -->
	<script type="text/javascript" src="js/jQuery-BlockUI/jquery.blockUI.min.js"></script>
	<!-- DATA TABLES -->
	<script type="text/javascript" src="js/datatables/media/js/jquery.dataTables.min.js"></script>
	<script type="text/javascript" src="js/datatables/media/assets/js/datatables.min.js"></script>
	<script type="text/javascript" src="js/datatables/extras/TableTools/media/js/TableTools.min.js"></script>
	<script type="text/javascript" src="js/datatables/extras/TableTools/media/js/ZeroClipboard.min.js"></script>
	<!-- DATE PICKER -->
	<script type="text/javascript" src="js/datepicker/picker.js"></script>
	<script type="text/javascript" src="js/datepicker/picker.date.js"></script>
	<script type="text/javascript" src="js/datepicker/picker.time.js"></script>
	<!-- COOKIE -->
	<script type="text/javascript" src="js/jQuery-Cookie/jquery.cookie.min.js"></script>
	<!-- CUSTOM SCRIPT -->
	<script src="js/script.js"></script>
	<script>
		jQuery(document).ready(function() {		
			App.setPage("dynamic_table");  //Set current page
			App.init(); //Initialise plugins and elements

		});


		function callDate()
		{
			$("#datepicker").datepicker({ dateFormat: 'yy-mm-dd' });
		}


		//$('a.reload').click(function() {
       //    $.ajax("/dtables.html").done(function (reply) {
        //      $('.box-body').html(reply);
       //    });
       // });

		//refresh data
        $('a.reload').click(function() {
			$.ajax({
			url: '/userlist',
			contentType: 'application/json;charset=UTF-8',
			cache:false,
			success: function (response) {
				//$(".box-body").html(response);
				//$("#tablebody").html($(response).find('#tablebody').html())

				//your flask route needs to send back the whole html for ,and you find the datatables' data
				var html = $(response).find('#datatable2').html();
                if ($('#datatable2').hasClass('dataTable')) {
                   var dttable = $('#datatable2').dataTable();
                    dttable.fnClearTable(); //清空一下table
                    dttable.fnDestroy(); //还原初始化了的datatable
                }
				//重新渲染datatable1
				 $("#datatable2").html(html);

				 //单纯的dynamic table 用这个方法
                //$('#datatable2').dataTable();

				//需要导出数据的table用这个,参考 script.js
                $('#datatable2').dataTable({
				"sPaginationType": "bs_full",
				sDom: "<'row'<'dataTables_header clearfix'<'col-md-4'l><'col-md-8'f>r>>t<'row'<'dataTables_footer clearfix'<'col-md-6'i><'col-md-6'p>>>",

			  });


			},
			error: function(response){
				alert('Error refreshing forum items')
			}
			});
         });

		//var timer = function() {
    	//setTimeout(function(){ window.location.reload(); }, 1500);
		//};
		//timer();

		function selectOneRecord(id)
		{

		//alert(id)
			$.ajax({
			url: '/edituser'+'/'+id,
			contentType: 'application/json;charset=UTF-8',
			cache:false,
			dataType: 'html',
			success: function (response) {

				var result = $('#box-config').append(response).find('#box-config').html();
				$('#box-config').html(result);

				$('#box-config').modal('show');
				}
			});
		}

		//add new record
		$('a.config').click(function() {
           selectOneRecord(0);
        });


	</script>
	<!-- /JAVASCRIPTS -->
</body>
</html>
