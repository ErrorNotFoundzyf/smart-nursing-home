<!-- SAMPLE BOX CONFIGURATION MODAL FORM-->
<div class="modal fade" id="box-config" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
				<div class="modal-dialog">
				  <div class="modal-content">
					<div class="modal-header">
					  <button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;</button>
						{% if selectuser.id==0 %}
					  		<h4 class="modal-title">添加用户</h4>
						 {% else %}
							<h4 class="modal-title">用户编辑</h4>
						{% endif %}
					</div>
					<div class="modal-body">
                        <div class="box-body big">
                            <form class="form-horizontal" action="/saveuser" method="post" role="form">
								<input type="hidden" name="userid" value="{{selectuser.id}}">

								<div class="form-group">
													<label class="col-sm-3 control-label">登录名称</label>
													<div class="col-sm-6">
													  <input class="form-control" id="focusedInput" name="username" type="text" value="{{selectuser.username}}">
													</div>
												  </div>
												  <div class="form-group">
													<label class="col-sm-3 control-label">用户名</label>
													<div class="col-sm-6">
														<input class="form-control" value="{{selectuser.real_name}}" name="realname" id="disabledInput" type="text" >
													</div>
												  </div>
												  <div class="form-group">
													<label class="col-sm-3 control-label">页面风格</label>
													<div class="col-sm-6">
														<input type="text" value="{{selectuser.theme}}" name="theme" class="form-control tip-focus">
													</div>
												  </div>
												  <div class="form-group">
													<label class="col-sm-3 control-label">邮箱</label>
													<div class="col-sm-6">
														<input type="text" value="{{selectuser.email}}" name="email" class="form-control tip-focus">
													</div>
												  </div>
												  <div class="form-group has-success">
													<label class="col-sm-3 control-label">创建日期</label>
													<div class="col-sm-6">
														<input type="text" name="created" value="{{selectuser.created}}" id="datepicker"  onblur="callDate();" class="form-control datepicker">
													</div>
												  </div>


                                <div class="modal-footer">
                                  <button type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
                                  <button type="submit"  class="btn btn-primary">保存</button>
                                </div>
                            </form>
                        </div>
					</div>

				  </div>
				</div>
			  </div>

						<!-- /SAMPLE BOX CONFIGURATION MODAL FORM-->
